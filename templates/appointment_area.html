{% block appointment_area %}
<div class="appointment_area">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-xl-5 col-md-6 col-lg-6">
                <div class="appiontment_thumb d-none d-lg-block">
                    <img src="{{ url_for('static', filename='assets/img/appointment/1.png') }}"
                        alt="Appointment">
                </div>
            </div>
            <div class="col-xl-6 offset-xl-1 col-md-6 col-md-12 col-lg-6">
                <div class="appointment_info">
                    <div class="opacity_icon d-none d-lg-block">
                        <i class="flaticon-balance"></i>
                    </div>
                    <h3>Schedule a Consultation</h3>
                    <p>Contact us to schedule a consultation and discuss your legal needs.</p>
                    <form class="form-contact contact_form" action="{{ url_for('submit_consultation') }}" method="post" id="consultation-form">
                        <div class="row">
                            <div class="col-xl-6 col-md-6">
                                <div class="form-group">
                                    <input class="form-control valid" name="name" id="name" type="text"
                                        onfocus="this.placeholder = ''"
                                        onblur="this.placeholder = 'Enter your name'"
                                        placeholder="Enter your name" required>
                                </div>
                            </div>
                            <div class="col-xl-6 col-md-6">
                                <div class="form-group">
                                    <input class="form-control valid" name="email" id="email" type="email"
                                        onfocus="this.placeholder = ''"
                                        onblur="this.placeholder = 'Enter email address'"
                                        placeholder="Enter email address" required>
                                </div>
                            </div>
                            <div class="col-xl-6 col-md-6">
                                <div class="form-group">
                                    <input class="form-control valid" name="phone" id="phone" type="text"
                                        onfocus="this.placeholder = ''"
                                        onblur="this.placeholder = 'Enter phone number'"
                                        placeholder="Enter phone number"
                                        pattern="{1}{9}" required>
                                    
                                </div>
                                
                            </div>
                            <div class="col-xl-6 col-md-6">
                                <div class="form-group">
                                    <input class="form-control valid" name="date" id="datepicker" type="text"
                                        onfocus="this.placeholder = ''"
                                        onblur="this.placeholder = 'Select Appointment Date'"
                                        placeholder="Select Appointment Date" required>
                                </div>
                            </div>
                            <div class="col-xl-6">
                                <div class="form-group">
                                    <textarea class="form-control w-100" name="message" id="message" cols="10" rows="2"
                                        onfocus="this.placeholder = ''"
                                        onblur="this.placeholder = 'Enter Message'"
                                        placeholder="Enter Message" required></textarea>
                                </div>
                            </div>
                            <div class="col-xl-12">
                                <div class="appoinment_button">
                                    <button class="boxed-btn5" type="submit">Submit</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('consultation-form').addEventListener('submit', function(event) {
        let name = document.querySelector('input[name="name"]').value;
        let email = document.querySelector('input[name="email"]').value;
        let phone = document.querySelector('input[name="phone"]').value;
        let date = document.querySelector('input[name="date"]').value;
        let message = document.querySelector('textarea[name="message"]').value;

        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Basic email regex
        let phoneRegex = /^{1}{9}$/; // 10-digit Indian phone number

        if (name.trim() === '') {
            alert('Please enter your name.');
            event.preventDefault(); // Prevent form submission
            return;
        }

        if (!emailRegex.test(email)) {
            alert('Please enter a valid email address.');
            event.preventDefault();
            return;
        }

        if (!phoneRegex.test(phone)) {
            alert('Please enter a valid 10-digit Indian phone number.');
            event.preventDefault();
            return;
        }

        if (date.trim() === '') {
            alert('Please select an appointment date.');
            event.preventDefault();
            return;
        }

        if (message.trim() === '') {
            alert('Please enter your message.');
            event.preventDefault();
            return;
        }
    });
</script>
{% endblock %}
